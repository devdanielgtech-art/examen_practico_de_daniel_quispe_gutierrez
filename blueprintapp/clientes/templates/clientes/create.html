{% extends "base.html" %}

{% block title %}Crear Cliente{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header"><h1 class="h3">Nuevo Cliente</h1></div>
    <div class="card-body">
        <form action="{{ url_for('bp_clientes.create') }}" method="POST">
            <div class="mb-3"><label class="form-label">Nombre:</label><input type="text" class="form-control" name="nombre" required></div>
            <div class="mb-3"><label class="form-label">Teléfono:</label><input type="text" class="form-control" name="telefono" required></div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('bp_clientes.index') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
