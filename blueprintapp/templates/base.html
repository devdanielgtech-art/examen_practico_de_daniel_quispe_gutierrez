<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DANIEL QUISPE GUTIERREZ{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('bp_clientes.index') }}">Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('bp_productos.index') }}">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('bp_pedidos.index') }}">Pedidos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if request.endpoint == 'index' %}
        <div class="text-center mt-5">
            <h1>EXAMEN PRACTICO de DANIEL QUISPE GUTIERREZ</h1>
            <h3>RU: 200080152</h3>
            <div class="mt-4">
                <a href="{{ url_for('bp_clientes.index') }}" class="btn btn-primary mx-2">Clientes</a>
                <a href="{{ url_for('bp_productos.index') }}" class="btn btn-success mx-2">Productos</a>
                <a href="{{ url_for('bp_pedidos.index') }}" class="btn btn-warning mx-2">Pedidos</a>
            </div>
        </div>
        {% else %}
        {% block content %}
        {% endblock %}
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
